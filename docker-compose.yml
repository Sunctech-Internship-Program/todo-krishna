version: '3.8'

services:
  db:
      image: postgres:15
      environment:
        - POSTGRES_DB=tododb
        - POSTGRES_USER=todouser
        - POSTGRES_PASSWORD=todopass
      volumes:
        - postgres_data:/var/lib/postgresql/data
  web:
      build: .
      command: python manage.py runserver 0.0.0.0:8000
      volumes:
        - .:/app
      ports:
        - "8000:8000"
      depends_on:
        - db
volumes:
  postgres_data: